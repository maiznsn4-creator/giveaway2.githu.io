<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhmerLife | Fast Loading</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Moul&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg: #e0e5ec;
            --text: #31344b;
            --blue: #0088cc;
            --shadow-light: 6px 6px 12px #a3b1c6;
            --shadow-white: -6px -6px 12px #ffffff;
            --shadow-inset: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kantumruy Pro', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 20px; overflow-x: hidden; }
        .container { width: 100%; max-width: 420px; }

        .card {
            background: var(--bg); border-radius: 35px; padding: 30px 20px;
            box-shadow: var(--shadow-light), var(--shadow-white);
            margin-bottom: 30px; text-align: center;
        }

        .icon-circle {
            width: 80px; height: 80px; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); border-radius: 50%;
            box-shadow: var(--shadow-light), var(--shadow-white);
            font-size: 35px; color: var(--blue);
        }

        h2 { font-family: 'Moul', serif; font-size: 17px; color: var(--blue); margin-bottom: 15px; }
        .balance-val { font-size: 45px; font-weight: 800; margin: 10px 0; }

        .neu-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; background: var(--bg);
            box-shadow: var(--shadow-light), var(--shadow-white);
            border-radius: 18px; border: none; cursor: pointer;
            width: 100%; color: var(--text); font-weight: 700; margin-bottom: 15px;
            transition: 0.2s; text-decoration: none;
        }
        .neu-btn:active { box-shadow: var(--shadow-inset); transform: scale(0.97); }
        
        .link-display {
            background: var(--bg); box-shadow: var(--shadow-inset);
            padding: 15px; border-radius: 15px; font-size: 11px;
            word-break: break-all; margin: 20px 0; text-align: left;
        }

        #dashboard-ui, #verify-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="verify-ui">
        <div class="card">
            <div class="icon-circle"><i class="fas fa-lock"></i></div>
            <h2>ផ្ទៀងផ្ទាត់ការចូលរួម</h2>
            <p style="font-size: 13px; margin-bottom: 20px;">សូម Join Channel ទាំង ២ ដើម្បីចាប់ផ្ដើម</p>
            <a href="https://t.me/Select_Store1" target="_blank" class="neu-btn">
                <span><i class="fab fa-telegram-plane"></i> Select Store 1</span>
                <i class="fas fa-external-link-alt"></i>
            </a>
            <a href="https://t.me/Select_Store2" target="_blank" class="neu-btn">
                <span><i class="fab fa-telegram-plane"></i> Select Store 2</span>
                <i class="fas fa-external-link-alt"></i>
            </a>
            <button class="neu-btn" style="color: var(--blue); justify-content: center; margin-top: 10px;" onclick="checkMembership()">
                ផ្ទៀងផ្ទាត់ឥឡូវនេះ
            </button>
        </div>
    </div>

    <div id="dashboard-ui">
        <div class="card">
            <div style="font-size: 12px; opacity: 0.6;">សមតុល្យសរុប</div>
            <div class="balance-val">$<span id="bal-amount">0.00</span></div>
            <p style="font-size: 11px;">ដកប្រាក់ចាប់ពី $0.50</p>
        </div>

        <div class="card">
            <h2>ណែនាំមិត្តភក្តិ</h2>
            <div class="link-display" onclick="copyLink()">
                <span id="link-text">https://t.me/...</span>
            </div>
            <button class="neu-btn" style="color: #2ecc71; justify-content: center;" onclick="shareLink()">
                <i class="fab fa-telegram"></i> ផ្ញើទៅកាន់មិត្តភក្តិ
            </button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "7718769824:AAHRxjM43ZHD4ZkGq8lIh7C5A5FhxvOnJs0";
    const CHANNELS = ["-1002259615654", "-1001844015273"];
    const ADMIN_GROUP = "-1003849367168";
    const inviterId = tg.initDataUnsafe.start_param;

    window.onload = () => {
        // ឆែកក្នុង CloudStorage របស់ Telegram (លឿន និងមិនចាំបាច់មាន Server)
        tg.CloudStorage.getItem('is_verified', (err, value) => {
            if (value === 'yes') {
                showDashboard();
            } else {
                document.getElementById('verify-ui').style.display = 'block';
            }
        });
    };

    async function checkMembership() {
        const userId = tg.initDataUnsafe.user.id;
        Swal.fire({ title: 'កំពុងពិនិត្យ...', background: '#e0e5ec', didOpen: () => Swal.showLoading() });

        let isAllJoined = true;
        for (const cid of CHANNELS) {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${cid}&user_id=${userId}`);
                const d = await r.json();
                if (!d.ok || !['member', 'administrator', 'creator'].includes(d.result.status)) {
                    isAllJoined = false; break;
                }
            } catch (e) { isAllJoined = false; }
        }

        if (isAllJoined) {
            tg.CloudStorage.setItem('is_verified', 'yes');
            if (inviterId) {
                const msg = `🎊 ណែនាំថ្មី!\nអ្នកថ្មី: ${tg.initDataUnsafe.user.first_name}\nអ្នកណែនាំ: ${inviterId}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_GROUP}&text=${encodeURIComponent(msg)}`);
            }
            Swal.fire('ជោគជ័យ!', 'ស្វាគមន៍មកកាន់ Dashboard', 'success').then(() => location.reload());
        } else {
            Swal.close();
            Swal.fire('មិនទាន់ជាប់!', 'សូម Join Channel ទាំង ២ សិន!', 'error');
        }
    }

    function showDashboard() {
        document.getElementById('verify-ui').style.display = 'none';
        document.getElementById('dashboard-ui').style.display = 'block';
        document.getElementById('link-text').innerText = `https://t.me/Free19_tool_bot/Giveaway?startapp=${tg.initDataUnsafe.user.id}`;
    }

    function copyLink() {
        const link = document.getElementById('link-text').innerText;
        navigator.clipboard.writeText(link);
        tg.showAlert("ចម្លងរួចរាល់!");
    }

    function shareLink() {
        const link = document.getElementById('link-text').innerText;
        window.open(`https://t.me/share/url?url=${link}&text=${encodeURIComponent("តោះ! រកលុយជាមួយ KhmerLife 💸")}`);
    }
</script>
</body>
</html>
